<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="520" viewBox="0 0 1280 520" role="img" aria-label="Цепочка сравнения версий">
  <defs>
    <linearGradient id="step" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#eef6ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#0f172a" flood-opacity=".12"/>
    </filter>
  </defs>
  <rect width="1280" height="520" rx="24" fill="#eef4f8"/>
  <text x="64" y="72" font-family="Segoe UI, Arial, sans-serif" font-weight="800" font-size="32" fill="#0f172a">Как создаются строки в реестре</text>
  <text x="64" y="106" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#475569">Новый файл всегда сравнивается с предыдущей версией выбранного объекта.</text>

  <rect x="78" y="168" width="270" height="178" rx="18" fill="url(#step)" stroke="#c8d8ea" filter="url(#shadow)"/>
  <circle cx="112" cy="204" r="18" fill="#2563eb"/>
  <text x="106" y="210" font-family="Segoe UI, Arial, sans-serif" font-weight="700" font-size="16" fill="#fff">1</text>
  <text x="140" y="210" font-family="Segoe UI, Arial, sans-serif" font-weight="700" font-size="20" fill="#0f172a">Первая загрузка</text>
  <text x="104" y="256" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#334155">Файл до: пусто</text>
  <text x="104" y="286" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#334155">Файл после: версия v1</text>
  <rect x="104" y="306" width="126" height="28" rx="14" fill="#ecfdf5" stroke="#5eead4"/>
  <text x="126" y="325" font-family="Segoe UI, Arial, sans-serif" font-weight="600" font-size="12" fill="#0f766e">Базовая версия</text>

  <path d="M368 258 H444" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <path d="M436 244 L456 258 L436 272" fill="none" stroke="#94a3b8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="466" y="168" width="292" height="178" rx="18" fill="url(#step)" stroke="#c8d8ea" filter="url(#shadow)"/>
  <circle cx="500" cy="204" r="18" fill="#2563eb"/>
  <text x="494" y="210" font-family="Segoe UI, Arial, sans-serif" font-weight="700" font-size="16" fill="#fff">2</text>
  <text x="528" y="210" font-family="Segoe UI, Arial, sans-serif" font-weight="700" font-size="20" fill="#0f172a">Следующая загрузка</text>
  <text x="492" y="256" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#334155">Файл до: версия v1</text>
  <text x="492" y="286" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#334155">Файл после: версия v2</text>
  <rect x="492" y="306" width="106" height="28" rx="14" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="514" y="325" font-family="Segoe UI, Arial, sans-serif" font-weight="600" font-size="12" fill="#c2410c">Изменен</text>

  <path d="M778 258 H854" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <path d="M846 244 L866 258 L846 272" fill="none" stroke="#94a3b8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="876" y="168" width="326" height="178" rx="18" fill="url(#step)" stroke="#c8d8ea" filter="url(#shadow)"/>
  <circle cx="910" cy="204" r="18" fill="#2563eb"/>
  <text x="904" y="210" font-family="Segoe UI, Arial, sans-serif" font-weight="700" font-size="16" fill="#fff">3</text>
  <text x="938" y="210" font-family="Segoe UI, Arial, sans-serif" font-weight="700" font-size="20" fill="#0f172a">Новая строка</text>
  <text x="902" y="256" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#334155">Файл до: версия v2</text>
  <text x="902" y="286" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#334155">Файл после: версия v3</text>
  <rect x="902" y="306" width="154" height="28" rx="14" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="924" y="325" font-family="Segoe UI, Arial, sans-serif" font-weight="600" font-size="12" fill="#2563eb">Сравнение v2 -> v3</text>

  <rect x="78" y="390" width="1124" height="66" rx="16" fill="#0f172a"/>
  <text x="112" y="430" font-family="Segoe UI, Arial, sans-serif" font-weight="700" font-size="18" fill="#fff">Итог:</text>
  <text x="174" y="430" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#e2e8f0">в истории сохраняются все шаги, а каждая новая проверка сравнивает соседние версии.</text>
</svg>
